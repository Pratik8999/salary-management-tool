server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests go to the backend service over the compose network.
    # The trailing slash on neither side means nginx forwards the URI as-is,
    # so /api/foo on the browser becomes /api/foo on the backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming-friendly for document upload/download.
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 10m;  # 10 MB — leaves headroom over DOCUMENT_MAX_BYTES (5 MB)
    }

    # SPA fallback — any other path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
