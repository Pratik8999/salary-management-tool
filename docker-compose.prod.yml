# Production stack — built images, no source mounts, no dev servers.
# Usage on a server:
#   cp .env.example .env && edit it     # set a strong JWT_SECRET + db password
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Only port 80 is exposed to the host; the frontend nginx proxies /api to
# the backend over the internal compose network. Postgres is internal only.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      STORAGE_ROOT: /data/documents
      DOCUMENT_MAX_BYTES: ${DOCUMENT_MAX_BYTES}
    volumes:
      - documents:/data
    # Run migrations then hand off to uvicorn — keeps the stack self-healing
    # across schema changes without manual `alembic upgrade head` on the box.
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  documents:
